<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">
    <h1>📊 Screen Tracker</h1>

    <h3 id="total">Total: 0 mins</h3>

    <p id="msg"></p>
  </div>

<script src="script.js"></script>
</body>
</html>
