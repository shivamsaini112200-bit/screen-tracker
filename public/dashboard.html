<!DOCTYPE html>
<html>
<head>
  <title>Screen Tracker</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(0,0,0,0.6);
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 350px;
      color: white;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .add-btn {
      background: #00bcd4;
      color: white;
    }

    .logout-btn {
      background: red;
      color: white;
    }

    canvas {
      margin-top: 20px;
      background: white;
      border-radius: 10px;
      padding: 10px;
    }
  </style>
</head>

<body>

<div class="card">

  <h1>📊 Screen Tracker</h1>

  <h2 id="welcome"></h2>

  <h3 id="total">Total: 0 mins</h3>

  <input id="time" placeholder="Enter screen time (minutes)">

  <button class="add-btn" onclick="addTime()">Add Time</button>

  <p id="msg"></p>

  <button class="logout-btn" onclick="logout()">Logout</button>

  <canvas id="usageChart"></canvas>

</div>

<script src="script.js"></script>

</body>
</html>
